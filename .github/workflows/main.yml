name: Main

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup app         # ← calling the composite action as a step
        uses: ./.github/actions/setup-python-app
        with:
          python-version: '3.11'

      - name: Run tests
        run: pytest tests/ -v
